<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Animated Hero Section</title>

  <!-- Bootstrap 4 CDN -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">

  <style>
    body, html {
      height: 100%;
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .bg-container {
      background: url('https://images.unsplash.com/photo-1503376780353-7e6692767b70') no-repeat center center/cover;
      height: 100vh;
      position: relative;
      color: white;
    }

    .bg-overlay {
      position: absolute;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.6);
    }

    .content {
      position: relative;
      z-index: 2;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      flex-direction: column;
    }

    /* Animation */
    .animate-title {
      font-size: 3rem;
      font-weight: bold;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1.5s ease forwards;
    }

    .animate-sub {
      font-size: 1.2rem;
      margin-top: 10px;
      opacity: 0;
      transform: translateY(30px);
      animation: fadeUp 1.5s ease forwards;
      animation-delay: 0.5s;
    }

    @keyframes fadeUp {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .btn-custom {
      margin-top: 20px;
      opacity: 0;
      animation: fadeUp 1.5s ease forwards;
      animation-delay: 1s;
    }
  </style>
</head>

<body>

  <div class="container-fluid bg-container">
    
    <div class="bg-overlay"></div>

    <div class="content">
      <h1 class="animate-title">Welcome</h1>
      <p class="animate-sub">Build something amazing with Bootstrap 4</p>
      <a href="#" class="btn btn-primary btn-lg btn-custom">Get Started</a>
    </div>

  </div>

</body>
</html>
